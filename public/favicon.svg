<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Simple, Clean Orange-to-Gold Gradient -->
    <linearGradient id="theme-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffaa00" />
      <stop offset="100%" stop-color="#ff4400" />
    </linearGradient>
    
    <!-- Subtle Glow for the Needle and Success Zone -->
    <filter id="simple-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Background Plate -->
  <circle cx="256" cy="256" r="240" fill="#0d0d11" stroke="#1f2029" stroke-width="8" />
  
  <!-- Outer Accent Ring (Matches Theme Gradient) -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="url(#theme-grad)" stroke-width="3" opacity="0.3" />

  <!-- Main Gauge Track (Subtle dark grey track) -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#1f2029" stroke-width="28" />

  <!-- SUCCESS ZONE (Simple gradient arc matching the theme) -->
  <path d="M 378 360 A 160 160 0 0 1 210 403" fill="none" stroke="url(#theme-grad)" stroke-width="28" stroke-linecap="round" />

  <!-- GREAT SUCCESS ZONE (Crisp white slice at the start of the zone) -->
  <path d="M 378 360 A 160 160 0 0 1 350 382" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" />

  <!-- THE NEEDLE (Matches the Theme Gradient) -->
  <g transform="rotate(135 256 256)">
    <!-- Sleek, straight pointed needle -->
    <path d="M 256 50 L 248 256 L 264 256 Z" fill="url(#theme-grad)" filter="url(#simple-glow)" />
    <!-- Tipped in white for high contrast -->
    <polygon points="256,40 250,56 262,56" fill="#ffffff" />
  </g>

  <!-- Center Cap -->
  <circle cx="256" cy="256" r="40" fill="#0d0d11" stroke="#1f2029" stroke-width="6" />
  <circle cx="256" cy="256" r="16" fill="url(#theme-grad)" />
</svg>
